<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>
</head>

<body>

    <h1>Student Registration Form</h1>

    <form>

        <fieldset>
            <legend>Personal Information</legend>

            <label for="fullname">Full Name:</label><br>
            <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>
            <br><br>

            <label for="fathername">Father Name:</label><br>
            <input type="text" id="fathername" name="fathername" placeholder="Enter your father name" required>
            <br><br>

            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>
            <br><br>

            <label for="password">Password:</label><br>
            <input type="password" id="password" name="password" placeholder="Enter password" required>
            <br><br>

            <label for="phone">Phone Number:</label><br>
            <input type="tel" id="phone" name="phone" placeholder="Enter phone number" required>
            <br><br>

            <label for="dob">Date of Birth:</label><br>
            <input type="date" id="dob" name="dob" required>
            <br><br>

            <label>Gender:</label><br>
            <input type="radio" id="male" name="gender" value="Male" required>
            <label for="male">Male</label>

            <input type="radio" id="female" name="gender" value="Female">
            <label for="female">Female</label>
            <br><br>

            <label>Skills:</label><br>
            <input type="checkbox" id="html" name="skills" value="HTML">
            <label for="html">HTML</label>

            <input type="checkbox" id="css" name="skills" value="CSS">
            <label for="css">CSS</label>

            <input type="checkbox" id="javascript" name="skills" value="JavaScript">
            <label for="javascript">JavaScript</label>
            <br><br>

            <label for="city">Select City:</label><br>
            <select id="city" name="city" required>
                <option value="">--Select City--</option>
                <option value="Karachi">Karachi</option>
                <option value="Lahore">Lahore</option>
                <option value="Islamabad">Islamabad</option>
            </select>
            <br><br>

            <label for="picture">Profile Picture:</label><br>
            <input type="file" id="picture" name="picture" required>
            <br><br>

            <label for="message">Message / Comments:</label><br>
            <textarea id="message" name="message" rows="5" cols="30" placeholder="Write your comments here..." required></textarea>
            <br><br>

            <input type="submit" value="Submit">

        </fieldset>

    </form>

</body>
</html>
